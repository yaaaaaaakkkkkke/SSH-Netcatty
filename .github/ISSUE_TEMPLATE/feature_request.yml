name: Feature Request
description: Suggest an improvement or new capability
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you are trying to solve and the change you want.
        Vague requests like "make it better" may be closed.

  - type: textarea
    id: problem
    attributes:
      label: Problem / pain point
      description: What is hard, missing, or frustrating today?
      placeholder: When I manage 50+ hosts, I cannot ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like Netcatty to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, workarounds, or designs you thought about.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Related area
      multiple: true
      options:
        - SSH / terminal
        - SFTP
        - Host vault / keychain
        - Port forwarding
        - Snippets
        - AI assistant
        - Settings / sync
        - UI / UX
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would improve my daily workflow
        - Blocking / critical for my use case
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions for similar requests
          required: true
